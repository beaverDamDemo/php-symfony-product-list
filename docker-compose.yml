services:
  app:
    build:
      context: .
    container_name: php-symfony-product-list-app
    ports:
      - "8080:80"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: product_list
      DB_USER: app
      DB_PASSWORD: app
    depends_on:
      - mysql

  mysql:
    image: mysql:8.4
    container_name: php-symfony-product-list-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: product_list
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro

volumes:
  mysql_data:
